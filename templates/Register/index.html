<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body{
            margin:0;
            padding:0;
            background:#f2f2f2;
            font-family:Arial;
        }

        .container{
            width:350px;
            margin:80px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:10px;
            background:#2196F3;
            color:white;
            border:none;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1565C0;
        }

        p{
            text-align:center;
        }

        a{
            text-decoration:none;
        }
    </style>

</head>

<body>

<div class="container">

<h2>Register</h2>

<form action="/register" method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">Register</button>

</form>

<p>
Already have an account?
<a href="/login">Login</a>
</p>

</div>

</body>
</html>
