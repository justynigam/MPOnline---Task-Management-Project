<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{
    margin:0;
    padding:0;
    background:#f2f2f2;
    font-family:Arial;
}

.container{
    width:350px;
    margin:100px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    background:#28a745;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1e7e34;
}

p{
    text-align:center;
}

a{
    text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

<form action="/login" method="POST">

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">Login</button>

</form>

<p>
Don't have an account?
<a href="/">Register</a>
</p>

</div>
</body>
</html>
